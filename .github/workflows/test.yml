# PR テスト workflow(デプロイとは完全分離)。
# 権限は contents:read のみ・id-token なし・secrets ゼロ:生成コードが Actions 上で
# 再実行されても窃取対象が無い。変更パスガードを先行 job にし、全テストは
# needs: path-guard でガード後にのみ実行する(範囲外の生成コードがガード前に動かない)。
name: test

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  path-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Reject changes outside the agent's allowed scope
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          changed="$(git diff --name-only "$BASE" "$HEAD")"
          echo "Changed files:"; echo "$changed"
          # 許可は app/ と tests/ のみ。app/agents/(エージェント自身)は禁止。
          outside="$(echo "$changed" | grep -vE '^(app/|tests/)' || true)"
          selfedit="$(echo "$changed" | grep -E '^app/agents/' || true)"
          if [ -n "$outside" ] || [ -n "$selfedit" ]; then
            echo "::error::Diff touches paths outside app/ and tests/ (or app/agents/):"
            echo "$outside"; echo "$selfedit"
            exit 1
          fi

  tests:
    needs: path-guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - name: Unit tests (SQLite)
        run: pytest -q -p no:cacheprovider --timeout=60 -m "not integration"
      - name: Integration tests (PostgreSQL)
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/testdb
        run: pytest -q -p no:cacheprovider --timeout=120 -m integration
