<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>会議室予約システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="bg-white border-b">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-semibold text-lg">会議室予約システム</a>
      <nav class="text-sm space-x-4">
        <a href="/" class="text-blue-600 hover:underline">予約する</a>
        <a href="/my" class="text-blue-600 hover:underline">マイ予約</a>
        <a href="/feedback" class="text-blue-600 hover:underline">報告する</a>
        <a href="/tickets" class="text-blue-600 hover:underline">マイ報告</a>
        <span class="text-slate-400">{{ user.name }}</span>
      </nav>
    </div>
  </header>
  <main class="max-w-3xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
