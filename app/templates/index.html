{% extends "base.html" %}
{% block content %}
<h1 class="text-xl font-semibold mb-4">会議室を予約する</h1>

{% if error %}
<div class="mb-4 rounded border border-red-300 bg-red-50 px-4 py-2 text-sm text-red-700">
  {{ error }}
</div>
{% endif %}

<form method="post" action="/reservations" class="bg-white rounded border p-4 space-y-4">
  <div>
    <label class="block text-sm font-medium mb-1">会議室</label>
    <select name="room_id" class="w-full border rounded px-3 py-2">
      {% for room in rooms %}
      <option value="{{ room.id }}">{{ room.name }}（{{ room.hourly_rate }}円/時）</option>
      {% endfor %}
    </select>
  </div>
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium mb-1">開始</label>
      <input type="datetime-local" name="start" required class="w-full border rounded px-3 py-2" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">終了</label>
      <input type="datetime-local" name="end" required class="w-full border rounded px-3 py-2" />
    </div>
  </div>
  <button type="submit" class="bg-blue-600 text-white rounded px-4 py-2 hover:bg-blue-700">
    予約する
  </button>
</form>
{% endblock %}
