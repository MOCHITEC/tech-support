<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 940" font-family="'Segoe UI','Meiryo',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6b8c"/>
    </marker>
    <marker id="arrowBack" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34A853"/>
    </marker>
    <style>
      .lane   { fill:#f4f7fb; stroke:#d5deeb; stroke-width:1.5; rx:14; }
      .lanel  { fill:#7688a8; font-size:15px; font-weight:700; letter-spacing:.5px; }
      .box    { rx:10; stroke-width:1.5; }
      .t      { font-size:15px; fill:#1f2a44; font-weight:600; }
      .s      { font-size:12.5px; fill:#5b6b8c; }
      .edge   { stroke:#5b6b8c; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .back   { stroke:#34A853; stroke-width:2; fill:none; marker-end:url(#arrowBack); stroke-dasharray:6 4; }
      .plat   { fill:#eef2f9; stroke:#cfdae9; stroke-width:1.5; rx:9; }
      .pt     { font-size:13px; fill:#33415c; font-weight:600; }
    </style>
  </defs>

  <rect width="1440" height="940" fill="#ffffff"/>
  <text x="48" y="52" font-size="27" font-weight="800" fill="#12203c">tech-support — ユーザから見える CI/CD</text>
  <text x="48" y="80" font-size="15" fill="#5b6b8c">ユーザのバグ報告が「失敗するテスト」になり、AI エージェントが再現・修正 → PR → 人間承認 → リリースまで自動化</text>

  <!-- Lane A: user / public app -->
  <rect class="lane" x="40" y="108" width="300" height="470"/>
  <text class="lanel" x="60" y="134">① ユーザ / 公開アプリ</text>
  <text class="s" x="60" y="153">Cloud Run(public)</text>
  <rect class="box" x="66" y="172" width="248" height="82" fill="#e7f0ff" stroke="#4285F4"/>
  <text class="t" x="82" y="200">バグ報告フォーム</text>
  <text class="s" x="82" y="222">タイトル / 手順 / TOBE・ASIS</text>
  <text class="s" x="82" y="240">＋ スクリーンショット</text>
  <rect class="box" x="66" y="470" width="248" height="86" fill="#e7f0ff" stroke="#4285F4"/>
  <text class="t" x="82" y="498">ステータスページ</text>
  <text class="s" x="82" y="520">状態機械のタイムライン</text>
  <text class="s" x="82" y="538">報告者へリリース通知</text>

  <!-- Lane B: agents -->
  <rect class="lane" x="360" y="108" width="470" height="700"/>
  <text class="lanel" x="380" y="134">② エージェント基盤（オーケストレータ）</text>
  <text class="s" x="380" y="153">Cloud Run(非公開・Pub/Sub push を OIDC で受信)</text>

  <rect class="box" x="386" y="172" width="418" height="52" fill="#f0ecff" stroke="#7C4DFF"/>
  <text class="t" x="402" y="204">Inbox 冪等記録（UNIQUE）＋ lease で二重処理防止</text>

  <rect class="box" x="386" y="240" width="418" height="66" fill="#fff5e0" stroke="#FBBC04"/>
  <text class="t" x="402" y="266">トリアージ（Gemini / Vertex AI）</text>
  <text class="s" x="402" y="288">bug / feature / needs_info / duplicate を仕様書 SHA 基準で判定</text>

  <rect class="box" x="386" y="322" width="418" height="52" fill="#e9f7ee" stroke="#34A853"/>
  <text class="t" x="402" y="354">再現テスト生成（実コードを import）</text>

  <rect class="box" x="386" y="390" width="418" height="66" fill="#ffeaea" stroke="#EA4335"/>
  <text class="t" x="402" y="416">サンドボックス実行（Cloud Run Job）</text>
  <text class="s" x="402" y="438">秘密ゼロ・外向き遮断・専用 SA で隔離実行</text>

  <rect class="box" x="386" y="472" width="418" height="66" fill="#e9f7ee" stroke="#34A853"/>
  <text class="t" x="402" y="498">修正の自己ループ（最大5回・再検証）</text>
  <text class="s" x="402" y="520">空応答は再試行、収束不能は人間へエスカレーション</text>

  <rect class="box" x="386" y="554" width="418" height="60" fill="#e7f0ff" stroke="#4285F4"/>
  <text class="t" x="402" y="582">PR 作成（GitHub App トークン）</text>
  <text class="s" x="402" y="601">パッチ＋再現テストをブランチへ push</text>

  <text class="s" x="402" y="646" fill="#8a6d3b">feature → 要件定義 Issue 起票 / dup・needs_info → 状態遷移で終了</text>
  <rect x="386" y="660" width="418" height="1.5" fill="#d5deeb"/>
  <text class="s" x="402" y="686">分岐は状態機械（app/state_machine.py）で許可遷移のみ実行</text>

  <!-- Lane C: github / human -->
  <rect class="lane" x="850" y="108" width="270" height="470"/>
  <text class="lanel" x="870" y="134">③ GitHub / 人間承認</text>
  <rect class="box" x="874" y="172" width="222" height="60" fill="#eef1f6" stroke="#57606a"/>
  <text class="t" x="890" y="200">Pull Request</text>
  <text class="s" x="890" y="220">レビュアー自動アサイン</text>
  <rect class="box" x="874" y="256" width="222" height="78" fill="#eef1f6" stroke="#57606a"/>
  <text class="t" x="890" y="284">レビュー / 承認</text>
  <text class="s" x="890" y="305">CODEOWNERS 必須</text>
  <text class="s" x="890" y="323">「@agent fix」で再修正</text>
  <rect class="box" x="874" y="358" width="222" height="58" fill="#e9f7ee" stroke="#34A853"/>
  <text class="t" x="890" y="386">マージ</text>
  <text class="s" x="890" y="405">demo ブランチへ</text>
  <rect class="box" x="874" y="440" width="222" height="72" fill="#fff5e0" stroke="#FBBC04"/>
  <text class="t" x="890" y="468">GitHub webhook</text>
  <text class="s" x="890" y="489">HMAC 署名検証</text>
  <text class="s" x="890" y="507">→ 公開 app が受理</text>

  <!-- Lane D: deploy/release -->
  <rect class="lane" x="1140" y="108" width="260" height="470"/>
  <text class="lanel" x="1160" y="134">④ デプロイ / リリース</text>
  <rect class="box" x="1164" y="172" width="212" height="86" fill="#e7f0ff" stroke="#4285F4"/>
  <text class="t" x="1180" y="200">GitHub Actions</text>
  <text class="s" x="1180" y="222">WIF（長期キーなし）</text>
  <text class="s" x="1180" y="240">build → migrate → deploy</text>
  <rect class="box" x="1164" y="290" width="212" height="80" fill="#e9f7ee" stroke="#34A853"/>
  <text class="t" x="1180" y="318">リリース反映</text>
  <text class="s" x="1180" y="340">対象チケットを</text>
  <text class="s" x="1180" y="358">「リリース済み」へ同期</text>

  <!-- edges -->
  <path class="edge" d="M314,213 H360 L386,198"/>
  <text class="s" x="316" y="200" fill="#8a6d3b">Pub/Sub</text>
  <path class="edge" d="M595,224 V240"/>
  <path class="edge" d="M595,306 V322"/>
  <path class="edge" d="M595,374 V390"/>
  <path class="edge" d="M595,456 V472"/>
  <path class="edge" d="M595,538 V554"/>
  <path class="edge" d="M804,584 H850 L874,202"/>
  <path class="edge" d="M985,334 V358"/>
  <path class="edge" d="M985,416 V440"/>
  <path class="edge" d="M1096,476 H1120 L1164,215"/>
  <path class="edge" d="M1270,258 V290"/>
  <!-- release notification back to status page -->
  <path class="back" d="M1164,340 C700,760 560,760 314,528"/>
  <text class="s" x="700" y="742" fill="#2c8a4d">リリース通知（報告者へ）</text>

  <!-- platform bar -->
  <rect x="40" y="836" width="1360" height="76" rx="12" fill="#0e1b34"/>
  <text x="64" y="862" font-size="13" font-weight="700" fill="#9fb4d6" letter-spacing=".5px">GOOGLE CLOUD 基盤（すべて Terraform でコード化）</text>
  <g>
    <rect class="plat" x="64"  y="872" width="150" height="28" fill="#16264a" stroke="#2b3f66"/><text class="pt" x="78" y="891" fill="#dbe6f7">Cloud SQL (PG)</text>
    <rect class="plat" x="228" y="872" width="160" height="28" fill="#16264a" stroke="#2b3f66"/><text class="pt" x="242" y="891" fill="#dbe6f7">Pub/Sub ＋ DLQ</text>
    <rect class="plat" x="402" y="872" width="90"  height="28" fill="#16264a" stroke="#2b3f66"/><text class="pt" x="416" y="891" fill="#dbe6f7">GCS</text>
    <rect class="plat" x="506" y="872" width="170" height="28" fill="#16264a" stroke="#2b3f66"/><text class="pt" x="520" y="891" fill="#dbe6f7">Secret Manager</text>
    <rect class="plat" x="690" y="872" width="180" height="28" fill="#16264a" stroke="#2b3f66"/><text class="pt" x="704" y="891" fill="#dbe6f7">Artifact Registry</text>
    <rect class="plat" x="884" y="872" width="210" height="28" fill="#16264a" stroke="#2b3f66"/><text class="pt" x="898" y="891" fill="#dbe6f7">VPC（restricted egress）</text>
    <rect class="plat" x="1108" y="872" width="130" height="28" fill="#16264a" stroke="#2b3f66"/><text class="pt" x="1122" y="891" fill="#dbe6f7">WIF</text>
    <rect class="plat" x="1252" y="872" width="132" height="28" fill="#16264a" stroke="#2b3f66"/><text class="pt" x="1266" y="891" fill="#dbe6f7">GitHub Actions</text>
  </g>
</svg>
